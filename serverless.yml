# replace service with your service nzme
service: engageall-user-details
# app and org for use with dashboard.serverless.com
#app: your-app-name
#org: your-org-name
frameworkVersion: '3.40.0'

# Add the serverless-webpack plugin
plugins:
  - serverless-webpack
  - serverless-offline
provider:
  name: aws
  stage: ${self:custom.myStage}
  runtime: nodejs20.x
  region: ${opt:region, 'ap-south-1'}
  memorySize: 1000
  timeout: 30
  lambdaHashingVersion: '20201221'
  endpointType: regional
  apiGateway: # API Gateway config mapping
    restApiId: ${self:custom.myEnvironment.restApiId.${self:custom.myStage}} # REST API resource ID. Default is generated by the framework
    restApiRootResourceId: ${self:custom.myEnvironment.restApiRootResourceId.${self:custom.myStage}} # Root resource ID, represent as / path
  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:Query
        - dynamodb:Scan
        - dynamodb:GetItem
        - dynamodb:PutItem
        - dynamodb:UpdateItem
        - dynamodb:DeleteItem
        - dynamodb:BatchGetItem
      Resource: '*'
    - Effect: Allow
      Action:
        - s3:*
      Resource: '*'
    - Effect: Allow
      Action:
        - cognito-sync:*
        - cognito-identity:*
      Resource: arn:aws:cognito-identity:*:*:*
    - Effect: Allow
      Action:
        - cognito-idp:*
      Resource: arn:aws:cognito-idp:*:*:*
    - Effect: Allow
      Action: 
        - logs:CreateLogGroup
        - logs:CreateLogStream
        - logs:PutLogEvents
        - logs:DescribeLogStreams
      Resource: '*'

custom:
  serverless-offline:
    httpPort: 4000
  myStage: ${opt:stage, 'dev'}
  myEnvironment:
    restApiId:
      dev: enzdzh0pw2
      test: rxc185hspl
      demo: wo3sk4dhf8
    restApiRootResourceId:
      dev: efxd9pizr7
      test: 1jclu0lpu0
      demo: jduggwbt3f
    USER_POOL_ID: # need to change according to a new pool name for engage_all_app
      demo: ap-south-1_ABn9MbUNF
      dev: ap-south-1_ABn9MbUNF
      test: ap-south-1_ABn9MbUNF
    COGNITO_CLIENT_ID:  # need to change according to a new pool name for engage_all_app
      demo: 51lo57ohjg8jn42usp65fra4u9
      dev: 51lo57ohjg8jn42usp65fra4u9
      test: 51lo57ohjg8jn42usp65fra4u9
    # OAUTH_URL: # need to change according to a new pool name for engage_all_app
    #   demo: https://vbui-demo.auth.ap-south-1.amazoncognito.com/oauth2/token
    #   dev: https://vbui.auth.ap-south-1.amazoncognito.com/oauth2/token
    #   test: https://vbui-test.auth.ap-south-1.amazoncognito.com/oauth2/token
    ORGANIZATION_TABLE:
      demo: organization_details
      dev: organization_details
      test: organization_details
    INVOICE_TABLE:
      demo: engageAll_invoice
      dev: engageAll_invoice
      test: engageAll_invoice
    INVENTORY_TABLE:
      demo: engageAll_inventory
      dev: engageAll_inventory
      test: engageAll_inventory
    PINCODE_TABLE:
      dev: pincode
    ENGAGEALL_ITEMS:
      dev: engageAll_items

  webpack:
    includeModules:
      forceInclude:
        - knex
        - pg # I'm using postgres  

functions:
   engageall-user-details-function:
    handler: src/server.router
    environment:
      ENV: ${self:custom.myStage}
      stage: ${self:provider.stage}
      ORGANIZATION_TABLE: ${self:custom.myEnvironment.ORGANIZATION_TABLE.${self:custom.myStage}}
      # USER_DATA_BUCKET: ${self:custom.myEnvironment.USER_DATA_BUCKET.${self:custom.myStage}}
      USER_POOL_ID: ${self:custom.myEnvironment.USER_POOL_ID.${self:custom.myStage}}
      # OAUTH_URL: ${self:custom.myEnvironment.OAUTH_URL.${self:custom.myStage}}
      COGNITO_CLIENT_ID: ${self:custom.myEnvironment.COGNITO_CLIENT_ID.${self:custom.myStage}}
      INVOICE_TABLE : ${self:custom.myEnvironment.INVOICE_TABLE.${self:custom.myStage}}
      INVENTORY_TABLE: ${self:custom.myEnvironment.INVENTORY_TABLE.${self:custom.myStage}}
      PINCODE_TABLE: ${self:custom.myEnvironment.PINCODE_TABLE.${self:custom.myStage}}
      ENGAGEALL_ITEMS: ${self:custom.myEnvironment.ENGAGEALL_ITEMS.${self:custom.myStage}}
    events:
      - http:
          cors: true
          method: post
          path: /orgDetails
      - http:
          cors: true
          method: get
          path: /getOrgDetails
      - http:
          cors: true
          method: post
          path: /userDetails
      - http:
          cors: true
          method: get
          path: /getUserDetails